{% extends 'base.html' %}

{% block content %}

<style>
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.page-title {
    font-size: 26px;
    color: #e2e8f0;
}

/* ADD BUTTON */
.add-btn {
    padding: 8px 14px;
    border-radius: 8px;
    background: #22c55e;
    color: black;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: 0.2s;
}

.add-btn:hover {
    transform: scale(1.05);
}

/* TABLE CONTAINER */
.table-container {
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    color: #e2e8f0;
}

/* HEADER */
th {
    text-align: left;
    padding: 14px;
    font-size: 13px;
    background: rgba(255,255,255,0.08);
    color: #94a3b8;
}

/* ROW */
td {
    padding: 14px;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
}

/* ROW HOVER */
tr:hover {
    background: rgba(255,255,255,0.04);
}

/* COVER */
td img {
    width: 45px;
    height: 65px;
    object-fit: cover;
    border-radius: 6px;
}

/* ACTION LINKS */
.actions a {
    text-decoration: none;
    font-size: 13px;
    margin-right: 8px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: 0.2s;
}

/* EDIT */
.actions a:first-child {
    color: #38bdf8;
    background: rgba(56,189,248,0.1);
}

.actions a:first-child:hover {
    background: #38bdf8;
    color: black;
}

/* DELETE */
.actions a:last-child {
    color: #ef4444;
    background: rgba(239,68,68,0.1);
}

.actions a:last-child:hover {
    background: #ef4444;
    color: white;
}
</style>

<div class="page-header">
    <h1 class="page-title">📚 Manage Books</h1>
    <a href="/books/admin/add/" class="add-btn">➕ Add Book</a>
</div>

<div class="table-container">
<table>

<tr>
    <th>Cover</th>
    <th>Title</th>
    <th>Author</th>
    <th>Stock</th>
    <th>Actions</th>
</tr>

{% for book in books %}

<tr>
    <td>
        {% if book.cover %}
            <img src="{{ book.cover.url }}">
        {% endif %}
    </td>


<td>{{ book.title }}</td>
<td>{{ book.author }}</td>
<td>{{ book.available_copies }}/{{ book.total_copies }}</td>

<td class="actions">
    <a href="/books/admin/edit/{{ book.id }}/">✏️ Edit</a>
    <a href="/books/admin/delete/{{ book.id }}/">❌ Delete</a>
</td>


</tr>
{% endfor %}

</table>
</div>

{% endblock %}
