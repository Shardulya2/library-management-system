{% extends 'base.html' %}

{% block content %}

<style>
.form-container {
    max-width: 520px;
    margin: auto;
    background: rgba(255,255,255,0.06);
    padding: 30px 25px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 35px rgba(0,0,0,0.6);
}

.form-container h1 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 24px;
    color: #e2e8f0;
}

/* FORM GROUP */
.form-group {
    margin-bottom: 18px;
}

/* LABEL */
label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #94a3b8;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: #e2e8f0;
    font-size: 14px;
}

/* FILE INPUT */
input[type="file"] {
    background: rgba(255,255,255,0.05);
    cursor: pointer;
}

/* FOCUS EFFECT */
input:focus, select:focus, textarea:focus {
    box-shadow: 0 0 0 2px rgba(56,189,248,0.4);
}

/* ERROR */
.error {
    color: #ef4444;
    font-size: 12px;
    margin-top: 4px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 11px;
    margin-top: 10px;
    background: linear-gradient(90deg, #22c55e, #38bdf8);
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    transform: scale(1.03);
}

/* BACK LINK */
.back-link {
    display: block;
    margin-top: 15px;
    text-align: center;
}

.back-link a {
    color: #38bdf8;
    text-decoration: none;
    font-size: 14px;
}

.back-link a:hover {
    color: #22c55e;
}
</style>

<div class="form-container">


<h1>{{ title }}</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}

            {% if field.errors %}
                <div class="error">
                    {{ field.errors }}
                </div>
            {% endif %}
        </div>
    {% endfor %}

    <button>💾 Save</button>
</form>

<div class="back-link">
    <a href="/books/admin/">⬅ Back to Admin</a>
</div>


</div>

{% endblock %}
