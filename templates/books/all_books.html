{% extends 'base.html' %}

{% block title %}Browse Books{% endblock %}

{% block content %}

<style>
.page-title {
    font-size: 28px;
    margin-bottom: 20px;
    color: #e2e8f0;
}

/* SEARCH BAR */
.search-bar {
    margin-bottom: 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.search-bar input,
.search-bar select {
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: #e2e8f0;
    outline: none;
}

.search-bar button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #22c55e;
    color: black;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

.search-bar button:hover {
    transform: scale(1.05);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 25px;
}

/* BOOK CARD */
.book {
    background: rgba(255,255,255,0.05);
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    transition: 0.25s;
    backdrop-filter: blur(6px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

.book:hover {
    transform: translateY(-6px);
}

/* COVER */
.book img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8px;
}

/* TITLE */
.book div {
    font-size: 14px;
    margin-bottom: 6px;
}

/* BUTTON */
.book button {
    width: 100%;
    padding: 6px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 6px;
    color: #22c55e;
    cursor: pointer;
    transition: 0.2s;
}

.book button:hover {
    background: #22c55e;
    color: black;
}

/* EMPTY */
.empty {
    color: #94a3b8;
}
</style>

<h1 class="page-title">📚 Browse Books</h1>

<form method="GET" class="search-bar">
    <input type="text" name="q" placeholder="Search books..."
           value="{{ query|default:'' }}">


<select name="category">
    <option value="">All Categories</option>

    {% for cat in categories %}
        <option value="{{ cat.id }}"
            {% if cat.id|stringformat:"s" == selected_category %}
                selected
            {% endif %}
        >
            {{ cat.name }}
        </option>
    {% endfor %}
</select>

<button type="submit">Search</button>

</form>

<div class="grid">

{% for book in books %} <div class="book"> <img src="{{ book.cover.url }}"> <div>{{ book.title }}</div>


    <form method="POST" action="/transactions/request/{{ book.id }}/">
        {% csrf_token %}
        <button>Request</button>
    </form>
</div>


{% empty %} <p class="empty">No books found</p>
{% endfor %}

</div>

{% endblock %}
