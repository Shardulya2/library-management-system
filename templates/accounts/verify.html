<!DOCTYPE html>

<html>
<head>
    <title>Verify OTP</title>


<style>
    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Poppins', sans-serif;
        color: #e2e8f0;
    }

    .card {
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(10px);
        padding: 35px 28px;
        border-radius: 16px;
        width: 320px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    }

    h2 {
        margin-bottom: 10px;
    }

    .subtext {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 15px;
    }

    /* INPUT */
    input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        text-align: center;
        font-size: 18px;
        letter-spacing: 4px;
        background: rgba(255,255,255,0.08);
        color: #e2e8f0;
    }

    input:focus {
        box-shadow: 0 0 0 2px rgba(34,197,94,0.4);
    }

    /* BUTTON */
    button {
        width: 100%;
        padding: 11px;
        margin-top: 15px;
        background: rgba(34,197,94,0.2);
        color: #22c55e;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.25s;
    }

    button:hover {
        background: #22c55e;
        color: black;
        transform: scale(1.03);
    }

    /* ERROR */
    .error {
        color: #ef4444;
        margin-top: 10px;
        font-size: 13px;
    }
</style>


</head>
<body>

<div class="card">
    <h2>🔐 Verify OTP</h2>
    <div class="subtext">Enter the 6-digit code sent to your email</div>


{% if error %}
    <div class="error">
        {{ error }}
    </div>
{% endif %}

<form method="POST">
    {% csrf_token %}
    <input name="otp" placeholder="••••••" required>
    <button>Verify</button>
</form>


</div>

</body>
</html>
