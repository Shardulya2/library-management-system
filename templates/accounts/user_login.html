<!DOCTYPE html>

<html>
<head>
    <title>User Login</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        font-family: 'Poppins', sans-serif;
        color: #e2e8f0;
    }

    .card {
        width: 340px;
        padding: 35px 28px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    /* INPUTS */
    input {
        width: 100%;
        padding: 10px 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.08);
        color: #e2e8f0;
    }

    input:focus {
        box-shadow: 0 0 0 2px rgba(34,197,94,0.4);
    }

    /* BUTTON */
    button {
        width: 100%;
        padding: 11px;
        margin-top: 12px;
        background: rgba(34,197,94,0.2);
        color: #22c55e;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
    }

    button:hover {
        background: #22c55e;
        color: black;
        transform: scale(1.03);
    }

    /* LINK */
    .link {
        margin-top: 14px;
    }

    .link a {
        color: #38bdf8;
        text-decoration: none;
        font-size: 14px;
    }

    .link a:hover {
        color: #22c55e;
    }

    /* ERROR */
    .error {
        color: #ef4444;
        margin-bottom: 12px;
        font-size: 13px;
    }
</style>


</head>
<body>

<div class="card">
    <h2>👤 User Login</h2>


{% if error %}
    <div class="error">
        {{ error }}
    </div>
{% endif %}

<form method="POST">
    {% csrf_token %}
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button>Login</button>
</form>

<div class="link">
    <a href="/accounts/register/">Create Account</a>
</div>


</div>

</body>
</html>
