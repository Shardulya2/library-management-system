<!DOCTYPE html>

<html>
<head>
    <title>Library System - Choose Role</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        font-family: 'Poppins', sans-serif;
        color: white;
        position: relative;
        overflow: hidden;
    }

    /* subtle background effect */
    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background:
            radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04), transparent 40%);
        z-index: 0;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 32px;
        letter-spacing: 1px;
        color: #e2e8f0;
        z-index: 1;
    }

    .subtitle {
        color: #94a3b8;
        font-size: 14px;
        margin-bottom: 35px;
        z-index: 1;
    }

    .container {
        display: flex;
        gap: 50px;
        z-index: 1;
    }

    .card {
        width: 240px;
        height: 200px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        position: relative;
        overflow: hidden;
    }

    .card:active {
        transform: scale(0.97);
    }

    /* glow effect */
    .card::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
        top: -50%;
        left: -50%;
        opacity: 0;
        transition: 0.4s;
    }

    .card:hover::before {
        opacity: 1;
    }

    .card:hover {
        transform: translateY(-12px) scale(1.06);
    }

    .icon {
        font-size: 42px;
        margin-bottom: 12px;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.2));
    }

    h2 {
        margin: 5px 0;
        font-size: 22px;
        font-weight: 600;
    }

    p {
        color: #94a3b8;
        font-size: 13px;
        letter-spacing: 0.3px;
    }

    .user {
        border: 2px solid #22c55e;
    }

    .user:hover {
        box-shadow: 0 0 25px rgba(34,197,94,0.6);
    }

    .admin {
        border: 2px solid #38bdf8;
    }

    .admin:hover {
        box-shadow: 0 0 25px rgba(56,189,248,0.6);
    }
</style>


</head>
<body>

<h1>📚 Library Management System</h1>
<p class="subtitle">Choose your role to continue</p>

<div class="container">

<div class="card user" onclick="goUser()">
    <div class="icon">👤</div>
    <h2>User</h2>
    <p>Browse & Read Books</p>
</div>

<div class="card admin" onclick="goAdmin()">
    <div class="icon">🛠</div>
    <h2>Admin</h2>
    <p>Manage Library</p>
</div>


</div>

<script>
function goUser() {
    window.location.href = "/accounts/user-login/";
}

function goAdmin() {
    window.location.href = "/accounts/admin-login/";
}
</script>

</body>
</html>
